version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: binaai-postgres
    environment:
      POSTGRES_DB: binaai_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - binaai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d binaai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching, optional)
  redis:
    image: redis:7-alpine
    container_name: binaai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - binaai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application (for development)
  app:
    build: .
    container_name: binaai-app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/binaai_dev
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - binaai-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  binaai-network:
    driver: bridge
